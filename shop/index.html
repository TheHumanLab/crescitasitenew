<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shop — CRESCITA</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#fff;--fg:#000;--muted:#6b6b6b;--line:#e5e5e5}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--fg);font-family:"Montserrat",sans-serif}
    a{color:inherit;text-decoration:none}
    .nav{position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:22px 32px;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
    .logo{font-weight:700;letter-spacing:.14em;text-transform:uppercase}
    .wrap{max-width:1200px;margin:0 auto;padding:80px 24px}
    h1{font-size:clamp(32px,5vw,56px);font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
    .sub{color:var(--muted);font-size:14px;letter-spacing:.18em;text-transform:uppercase;margin-bottom:48px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:32px}
    .card{border:1px solid var(--line);transition:transform .2s}
    .card:hover{transform:translateY(-3px)}
    .card img{width:100%;aspect-ratio:4/5;object-fit:cover;background:#f5f5f5}
    .card-body{padding:16px}
    .name{font-weight:600;text-transform:uppercase;font-size:13px;letter-spacing:.08em}
    .price{margin-top:6px;font-size:13px;color:#111}
  </style>
</head>
<body>
  <header class="nav">
    <a href="/" class="logo">CRESCITA</a>
    <a href="/">Back to Home</a>
  </header>

  <main class="wrap">
    <h1>Collection 001</h1>
    <div class="sub">Limited runs — Durban / Worldwide</div>

    <div class="grid">
      <!-- duplicate this block per product -->
      <a href="/shop/products/tee-001.html" class="card">
        <img src="/assets/images/tee-001.jpg" alt="Crescita Tee 001">
        <div class="card-body">
          <div class="name">Tee 001 — Growth</div>
          <div class="price">R 850</div>
        </div>
      </a>

      <a href="/shop/products/hoodie-001.html" class="card">
        <img src="/assets/images/hoodie-001.jpg" alt="Crescita Hoodie">
        <div class="card-body">
          <div class="name">Hoodie 001 — Discipline</div>
          <div class="price">R 1,650</div>
        </div>
      </a>
    </div>
  </main>
</body>
</html>
