<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cap 001 — Faith — CRESCITA</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#fff;--fg:#000;--muted:#6b6b6b;--line:#e5e5e5}
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--fg);font-family:"Montserrat",sans-serif}
    a{color:inherit;text-decoration:none}
    .nav{position:sticky;top:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:22px 32px;background:rgba(255,255,255,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
    .logo{font-weight:700;letter-spacing:.14em;text-transform:uppercase;font-size:18px}
    .wrap{max-width:1200px;margin:0 auto;padding:60px 24px;display:grid;grid-template-columns:1.1fr 1fr;gap:56px}
    .img{width:100%;aspect-ratio:4/5;object-fit:cover;background:#f2f2f2;border:1px solid var(--line)}
    h1{font-size:clamp(28px,4vw,44px);font-weight:700;text-transform:uppercase;letter-spacing:.04em}
    .price{margin-top:12px;font-size:18px;font-weight:500}
    .desc{margin-top:24px;line-height:1.7;color:#222;font-size:15px;max-width:520px}
    .buy{margin-top:32px;display:flex;gap:12px;flex-wrap:wrap}
    .btn{padding:16px 26px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;border:1.5px solid #000;background:#000;color:#fff;cursor:pointer}
    .btn.secondary{background:transparent;color:#000}
    .meta{margin-top:40px;border-top:1px solid var(--line);padding-top:20px;font-size:12px;color:var(--muted);letter-spacing:.06em}
    @media(max-width:900px){.wrap{grid-template-columns:1fr;gap:32px}}
  </style>
</head>
<body>
  <header class="nav">
    <a href="/" class="logo">CRESCITA</a>
    <a href="/shop/">Back to Shop</a>
  </header>

  <main class="wrap">
    <img class="img" src="https://images.unsplash.com/photo-1588850561407-ed78c282e89b?q=80&w=1200&auto=format&fit=crop" alt="Cap 001 — Faith">
    <div>
      <h1>Cap 001 — Faith</h1>
      <div class="price">R 550</div>
      <p class="desc">6-panel wool blend, unstructured. Embroidered CRESCITA. Faith in the process.</p>
      <div class="buy">
        <button class="btn" onclick="alert('Added to bag — connect Shopify/Stripe later')">Add to Bag</button>
        <button class="btn secondary" onclick="location.href='/shop/'">Continue Shopping</button>
      </div>
      <div class="meta">Free delivery in SA over R1500 • Limited run • Ships in 2-3 days</div>
    </div>
  </main>
</body>
</html>
