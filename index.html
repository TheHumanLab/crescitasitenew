<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRESCITA — Luxury Streetwear</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#fff;--fg:#000;--muted:#6b6b6b;--line:#e5e5e5}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);color:var(--fg);font-family:"Montserrat",sans-serif}
    .nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;justify-content:space-between;align-items:center;padding:22px 32px;background:rgba(255,255,255,.7);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
    .logo{font-weight:700;letter-spacing:.14em;font-size:20px;text-transform:uppercase}
    .nav-cta{font-size:11px;text-transform:uppercase;letter-spacing:.2em;font-weight:500;border:1px solid #000;padding:10px 16px;border-radius:999px}
    .nav-cta:hover{background:#000;color:#fff}
    .hero{position:relative;height:100svh;width:100%;overflow:hidden}
    .hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:-2}
    .hero::after{content:"";position:absolute;inset:0;z-index:-1;background:linear-gradient(to top,rgba(255,255,255,.92)0%,rgba(255,255,255,.75)35%,rgba(255,255,255,.45)70%,rgba(255,255,255,.25)100%)}
    .hero-content{position:relative;height:100%;display:grid;place-items:center;text-align:center;padding:0 24px}
    .eyebrow{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--muted);margin-bottom:18px;font-weight:500}
    h1{font-weight:700;font-size:clamp(48px,9vw,128px);line-height:.9;letter-spacing:.02em;text-transform:uppercase}
    .tagline{margin-top:18px;font-size:clamp(14px,1.5vw,17px);color:#1a1a1a}
    .cta-row{margin-top:36px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
    .btn{padding:14px 24px;font-size:12px;letter-spacing:.18em;text-transform:uppercase;font-weight:600;border:1.5px solid #000;background:transparent}
    .btn:hover{background:#000;color:#fff}
    .btn.primary{background:#000;color:#fff}
    .btn.primary:hover{background:#fff;color:#000}
  </style>
</head>
<body>
  <header class="nav"><div class="logo">CRESCITA</div><a class="nav-cta" href="#shop">Shop Drop 001</a></header>
  <main>
    <section class="hero">
      <video autoplay muted loop playsinline preload="metadata"><source src="hero.mp4" type="video/mp4"></video>
      <div class="hero-content">
        <div>
          <div class="eyebrow">Est. 2026 — Durban / Worldwide</div>
          <h1>CRESCITA</h1>
          <p class="tagline">Luxury premium streetwear. Quiet power. Loud craft.</p>
          <div class="cta-row">
            <a class="btn primary" href="#collection">Enter Collection</a>
          </div>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
